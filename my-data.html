<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#05060B;--bg2:#0A0E1C;--bg3:#111630;
--glass:rgba(255,255,255,0.04);--glass2:rgba(255,255,255,0.07);--glass3:rgba(255,255,255,0.10);
--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
--red:#FF1B4C;--red2:#FF5D8F;--red3:#FF8FB5;
--cyan:#00E5FF;--cyan2:#00B8D4;
--ink:#EAF0FB;--muted:#6B7BA0;--muted2:#4A5678;
--green:#39FF9E;--amber:#FFD166;
--radius:18px;--radius-sm:12px;
--glow-red:0 0 24px rgba(255,27,76,0.4);--glow-cyan:0 0 20px rgba(0,229,255,0.3);
--font-ar:'Cairo','Tajawal',sans-serif;
--font-en:'Rajdhani','Orbitron',sans-serif;
--font-display-ar:'Tajawal',sans-serif;
--font-display-en:'Orbitron',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--font-ar);min-height:100vh;padding:16px 16px 80px;direction:rtl}
html[dir="ltr"] body{font-family:var(--font-en);direction:ltr}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);background-size:44px 44px;mask-image:radial-gradient(ellipse at 50% 0%,black,transparent 70%);-webkit-mask-image:radial-gradient(ellipse at 50% 0%,black,transparent 70%)}
body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(circle at 10% 0%,rgba(255,27,76,0.10),transparent 40%),radial-gradient(circle at 85% 10%,rgba(0,229,255,0.06),transparent 35%)}
h1,h2,h3{font-family:var(--font-display-ar);font-weight:800}
html[dir="ltr"] h1,html[dir="ltr"] h2,html[dir="ltr"] h3{font-family:var(--font-display-en);letter-spacing:0.3px}
::selection{background:rgba(255,27,76,0.35);color:#fff}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--glass3);border-radius:3px}

.lang-toggle{position:fixed;top:14px;inset-inline-end:14px;z-index:200;background:var(--glass2);border:1px solid var(--border);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:var(--cyan);font-weight:700;font-size:13px;padding:8px 16px;border-radius:999px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.lang-toggle:hover{box-shadow:var(--glow-cyan);border-color:rgba(0,229,255,0.4)}
.lang-toggle svg{width:16px;height:16px;fill:currentColor}
.lang-cycle{display:flex;gap:4px}
.lang-opt{padding:4px 8px;border-radius:6px;cursor:pointer;transition:all .15s;font-size:11px;font-weight:700}
.lang-opt.active{background:rgba(0,229,255,0.15);color:var(--cyan)}
.lang-opt:hover{color:var(--cyan)}

.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--cyan);text-decoration:none;font-size:13px;font-weight:700;margin-bottom:20px;padding:8px 14px;border-radius:var(--radius-sm);background:var(--glass);border:1px solid var(--border);transition:all .18s;position:relative;z-index:1}
.back-link:hover{box-shadow:var(--glow-cyan);border-color:rgba(0,229,255,0.3)}

.page-header{text-align:center;margin-bottom:28px;position:relative;z-index:1}
.page-header h1{font-size:24px;margin-bottom:6px;background:linear-gradient(135deg,#fff 30%,var(--red2) 65%,var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
.page-header p{font-size:13px;color:var(--muted);line-height:1.6}

.search-card{background:var(--glass);border:1px solid var(--border);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-radius:var(--radius);padding:20px;margin-bottom:20px;position:relative;z-index:1}
.search-card label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;color:var(--ink)}
.search-card input[type=tel]{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:14px;outline:none;background:rgba(255,255,255,0.035);color:var(--ink);transition:border-color .2s,box-shadow .2s}
html[dir="ar"] .search-card input{font-family:'Cairo'}
html[dir="ltr"] .search-card input{font-family:'Rajdhani'}
.search-card input:focus{border-color:var(--cyan);box-shadow:var(--glow-cyan)}
.search-card input::placeholder{color:var(--muted)}

.submit-btn{width:100%;background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;border:none;padding:13px;border-radius:var(--radius-sm);font-weight:800;font-size:15px;margin-top:14px;cursor:pointer;box-shadow:var(--glow-red);transition:all .2s}
html[dir="ltr"] .submit-btn{font-family:'Orbitron';font-size:12px}
.submit-btn:hover{box-shadow:0 0 40px rgba(255,27,76,0.25)}
.submit-btn:active{transform:scale(0.98)}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed}

.data-card{background:var(--glass);border:1px solid var(--border);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-radius:var(--radius);padding:20px;margin-bottom:16px;position:relative;z-index:1}
.data-card h2{font-size:18px;margin-bottom:16px;color:var(--ink)}

.data-field{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px}
.data-field:last-child{border-bottom:none}
.field-label{font-size:12px;color:var(--muted);font-weight:600;min-width:100px}
.field-value{font-size:14px;color:var(--ink);font-weight:600;text-align:left;direction:ltr;word-break:break-all}
html[dir="rtl"] .field-value{direction:rtl;text-align:right}
.field-value.available{color:var(--green)}
.field-value.unavailable{color:var(--amber)}

.edit-form{display:none;margin-top:12px;padding:12px;background:rgba(255,255,255,0.02);border:1px dashed var(--border);border-radius:var(--radius-sm)}
.edit-form.show{display:block}
.edit-form label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:var(--muted)}
.edit-form input,.edit-form select{width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);font-size:13px;outline:none;background:rgba(255,255,255,0.035);color:var(--ink);margin-bottom:8px;transition:border-color .2s}
.edit-form input:focus,.edit-form select:focus{border-color:var(--cyan);box-shadow:var(--glow-cyan)}
.edit-actions{display:flex;gap:8px}
.btn-save{background:linear-gradient(135deg,var(--cyan),var(--cyan2));color:#000;border:none;padding:8px 16px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;transition:all .18s}
.btn-save:hover{box-shadow:var(--glow-cyan)}
.btn-cancel{background:var(--glass2);color:var(--muted);border:1px solid var(--border);padding:8px 16px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;transition:all .18s}
.btn-cancel:hover{color:var(--ink);border-color:var(--border2)}

.action-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.action-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:var(--radius-sm);font-weight:700;font-size:13px;cursor:pointer;transition:all .18s;border:none;text-decoration:none}
.action-btn:active{transform:scale(0.96)}
.btn-download{background:rgba(0,229,255,0.1);color:var(--cyan);border:1px solid rgba(0,229,255,0.3)}
.btn-download:hover{background:rgba(0,229,255,0.18)}
.btn-edit-all{background:rgba(255,209,102,0.1);color:var(--amber);border:1px solid rgba(255,209,102,0.3)}
.btn-edit-all:hover{background:rgba(255,209,102,0.18)}
.btn-delete{background:rgba(255,27,76,0.1);color:var(--red2);border:1px solid rgba(255,27,76,0.3)}
.btn-delete:hover{background:rgba(255,27,76,0.18)}

.error-box{text-align:center;padding:24px;color:var(--muted);position:relative;z-index:1}
.error-box .err-icon{font-size:36px;margin-bottom:8px;display:block}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:999px;font-weight:700;font-size:13px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.success{background:linear-gradient(135deg,#39FF9E,#00C896);color:#000;box-shadow:0 4px 20px rgba(57,255,158,0.3)}
.toast.error{background:linear-gradient(135deg,#FF1B4C,#FF5D8F);color:#fff;box-shadow:var(--glow-red)}
.toast.show{opacity:1}

@media(max-width:380px){.action-row{flex-direction:column}.action-btn{justify-content:center}}

.page-enter{animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<button class="lang-toggle" id="langToggle" aria-label="تبديل اللغة">
  <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>

<div class="toast" id="toast"></div>

<div style="max-width:520px;margin:0 auto">
  <a href="index.html" class="back-link" data-i18n="backToApp">← العودة إلى التطبيق</a>

  <div class="page-header page-enter">
    <h1 data-i18n="pageTitle">بياناتي</h1>

  </div>

  <!-- Phone Search -->
  <div class="search-card page-enter" id="searchCard">
    <label data-i18n="labelPhone">رقم الهاتف</label>
    <input type="tel" id="phoneInput" placeholder="07xxxxxxxx" pattern="^0[5-7][0-9]{8}$" maxlength="10" required aria-label="رقم الهاتف">
    <button class="submit-btn" id="searchBtn" data-i18n="searchBtn">عرض بياناتي</button>
  </div>

  <!-- Data Display (hidden until phone verified) -->
  <div id="dataSection" style="display:none">
    <div class="data-card page-enter">
      <h2 data-i18n="personalInfo">المعلومات الشخصية</h2>
      <div id="fieldsContainer"></div>

      <div class="edit-form" id="editForm">
        <div id="editFields"></div>
        <div class="edit-actions">
          <button class="btn-save" id="saveBtn" data-i18n="saveChanges">حفظ التغييرات</button>
          <button class="btn-cancel" id="cancelEditBtn" data-i18n="cancel">إلغاء</button>
        </div>
      </div>
    </div>

    <div class="action-row">
      <button class="action-btn btn-download" id="downloadBtn" data-i18n="downloadJson">📥 تحميل JSON</button>
      <button class="action-btn btn-edit-all" id="editAllBtn" data-i18n="editData">✏️ تعديل البيانات</button>
      <a href="delete-data.html" class="action-btn btn-delete" data-i18n="deleteData">🗑️ حذف بياناتي</a>
    </div>
  </div>

  <div class="error-box" id="errorBox" style="display:none">
    <span class="err-icon">🔍</span>
    <p data-i18n="noDataFound">لم يتم العثور على بيانات مسجلة لهذا الرقم</p>
  </div>
</div>

<script>
const SUPABASE_URL = "https://wqlhjcchqtnkcjcocejf.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndxbGhqY2NocXRua2NqY29jZWpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NDE2NTAsImV4cCI6MjA5OTUxNzY1MH0.BwbJx8MSmHhKlSjNMR_l7h2xMi3MT-mWDERnm29-53g";
const sb = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

let currentLang = localStorage.getItem('qatra_lang') || 'ar';
let donorData = null;

const FIELD_MAP = {
  full_name: {ar:'الاسم الكامل', en:'Full Name', fr:'Nom complet'},
  phone: {ar:'رقم الهاتف', en:'Phone', fr:'Téléphone'},
  blood_type: {ar:'زمرة الدم', en:'Blood Type', fr:'Groupe sanguin'},
  wilaya: {ar:'الولاية', en:'Wilaya', fr:'Wilaya'},
  commune: {ar:'البلدية', en:'Commune', fr:'Commune'},
  facebook_url: {ar:'رابط فيسبوك', en:'Facebook URL', fr:'Lien Facebook'},
  last_donation_date: {ar:'تاريخ آخر تبرع', en:'Last Donation', fr:'Dernière don'},
  is_available: {ar:'متاح للتبرع', en:'Available', fr:'Disponible'},
  created_at: {ar:'تاريخ التسجيل', en:'Registered', fr:'Inscrit le'}
};

const WILAYAS_AR = {
"01":"أدرار","02":"الشلف","03":"الأغواط","04":"أم البواقي","05":"باتنة","06":"بجاية","07":"بسكرة","08":"بشار","09":"البليدة","10":"البويرة",
"11":"تمنراست","12":"تبسة","13":"تلمسان","14":"تيارت","15":"تيزي وزو","16":"الجزائر","17":"الجلفة","18":"جيجل","19":"سطيف","20":"سعيدة",
"21":"سكيكدة","22":"سيدي بلعباس","23":"عنابة","24":"قالمة","25":"قسنطينة","26":"المدية","27":"مستغانم","28":"المسيلة","29":"معسكر","30":"ورقلة",
"31":"وهران","32":"البيض","33":"إليزي","34":"برج بوعريريج","35":"بومرداس","36":"الطارف","37":"تندوف","38":"تيسمسيلت","39":"الوادي","40":"خنشلة",
"41":"سوق أهراس","42":"تيبازة","43":"ميلة","44":"عين الدفلى","45":"النعامة","46":"عين تموشنت","47":"غرداية","48":"غليزان","49":"تيميمون","50":"برج باجي مختار",
"51":"أولاد جلال","52":"بني عباس","53":"عين صالح","54":"عين قزام","55":"توقرت","56":"جانت","57":"المغير","58":"المنيعة"
};

const T = {
  ar: {
    backToApp:'← العودة إلى التطبيق', pageTitle:'بياناتي',
    pageSubtitle:'عرض وتعديل جميع بياناتك المسجلة في قطرة',
    labelPhone:'رقم الهاتف', searchBtn:'عرض بياناتي',
    personalInfo:'المعلومات الشخصية',
    noDataFound:'لم يتم العثور على بيانات مسجلة لهذا الرقم',
    downloadJson:'📥 تحميل JSON', editData:'✏️ تعديل البيانات',
    deleteData:'🗑️ حذف بياناتي',
    saveChanges:'حفظ التغييرات', cancel:'إلغاء',
    searchPlaceholder:'07xxxxxxxx',
    statusAvailable:'متاح ✓', statusUnavailable:'غير متاح',
    editField:'تعديل', saving:'جارٍ الحفظ...',
    toastSaved:'تم حفظ التغييرات بنجاح ✓', toastError:'حدث خطأ، حاول مجددًا',
    toastDownload:'تم تحميل البيانات ✓',
    enterPhone:'أدخل رقم هاتفك لعرض بياناتك',
    loading:'جارٍ التحقق...',
    notAvailable:'غير متوفر'
  },
  en: {
    backToApp:'← Back to app', pageTitle:'My Data',
    pageSubtitle:'View and edit all your registered data on Qatra',
    labelPhone:'Phone number', searchBtn:'View my data',
    personalInfo:'Personal Information',
    noDataFound:'No data found for this phone number',
    downloadJson:'📥 Download JSON', editData:'✏️ Edit data',
    deleteData:'🗑️ Delete my data',
    saveChanges:'Save changes', cancel:'Cancel',
    searchPlaceholder:'07xxxxxxxx',
    statusAvailable:'Available ✓', statusUnavailable:'Unavailable',
    editField:'Edit', saving:'Saving...',
    toastSaved:'Changes saved successfully ✓', toastError:'Error, please try again',
    toastDownload:'Data downloaded ✓',
    enterPhone:'Enter your phone number to view your data',
    loading:'Verifying...',
    notAvailable:'N/A'
  },
  fr: {
    backToApp:'← Retour à l\'application', pageTitle:'Mes Données',
    pageSubtitle:'Consultez et modifiez toutes vos données enregistrées sur Qatra',
    labelPhone:'Numéro de téléphone', searchBtn:'Afficher mes données',
    personalInfo:'Informations personnelles',
    noDataFound:'Aucune donnée trouvée pour ce numéro',
    downloadJson:'📥 Télécharger JSON', editData:'✏️ Modifier les données',
    deleteData:'🗑️ Supprimer mes données',
    saveChanges:'Enregistrer', cancel:'Annuler',
    searchPlaceholder:'07xxxxxxxx',
    statusAvailable:'Disponible ✓', statusUnavailable:'Indisponible',
    editField:'Modifier', saving:'Enregistrement...',
    toastSaved:'Modifications enregistrées ✓', toastError:'Erreur, veuillez réessayer',
    toastDownload:'Données téléchargées ✓',
    enterPhone:'Entrez votre numéro pour afficher vos données',
    loading:'Vérification...',
    notAvailable:'N/A'
  }
};

function t(k){return T[currentLang][k]||T['ar'][k]||k}

function applyLang(){
  document.documentElement.lang = currentLang;
  document.documentElement.dir = currentLang==='ar'?'rtl':'ltr';
  document.title = currentLang==='ar'?'بياناتي | قطرة':currentLang==='fr'?'Mes Données | Qatra':'My Data | Qatra';
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.dataset.i18n;
    if(T[currentLang][k]!==undefined) el.textContent=T[currentLang][k];
  });
  document.querySelectorAll('.lang-opt').forEach(o=>{
    o.classList.toggle('active',o.dataset.lang===currentLang);
  });
  document.getElementById('phoneInput').placeholder = t('searchPlaceholder');
  if(donorData) renderData();
}

document.querySelectorAll('.lang-opt').forEach(o=>{
  o.addEventListener('click',()=>{
    currentLang=o.dataset.lang;
    localStorage.setItem('qatra_lang',currentLang);
    applyLang();
  });
});

function showToast(msg,type){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast '+type+' show';
  setTimeout(()=>el.classList.remove('show'),2500);
}

function formatField(key,val){
  if(val===null||val===undefined||val==='') return t('notAvailable');
  if(key==='is_available') return val?t('statusAvailable'):t('statusUnavailable');
  if(key==='wilaya'&&WILAYAS_AR[String(val)]) return String(val)+' - '+WILAYAS_AR[String(val)];
  if(key==='created_at'||key==='last_donation_date'){
    try{return new Date(val).toLocaleDateString(currentLang==='ar'?'ar-DZ':currentLang==='fr'?'fr-FD':'en-US')}catch(e){return val}
  }
  return String(val);
}

function renderData(){
  if(!donorData) return;
  const container=document.getElementById('fieldsContainer');
  container.innerHTML='';
  Object.keys(FIELD_MAP).forEach(key=>{
    const div=document.createElement('div');
    div.className='data-field';
    const val=formatField(key,donorData[key]);
    const valClass=key==='is_available'?(donorData[key]?'available':'unavailable'):'';
    div.innerHTML=`
      <span class="field-label">${FIELD_MAP[key][currentLang]||FIELD_MAP[key]['ar']}</span>
      <span class="field-value ${valClass}">${val}</span>
    `;
    container.appendChild(div);
  });
}

function renderEditForm(){
  const edit=document.getElementById('editFields');
  edit.innerHTML='';
  const editableFields=['full_name','blood_type','wilaya','facebook_url','last_donation_date','is_available'];
  editableFields.forEach(key=>{
    const label=document.createElement('label');
    label.textContent=FIELD_MAP[key][currentLang]||FIELD_MAP[key]['ar'];
    edit.appendChild(label);
    if(key==='is_available'){
      const sel=document.createElement('select');
      sel.id='edit_'+key;
      sel.innerHTML=`<option value="true">${t('statusAvailable')}</option><option value="false">${t('statusUnavailable')}</option>`;
      sel.value=String(donorData[key]||false);
      edit.appendChild(sel);
    }else if(key==='blood_type'){
      const sel=document.createElement('select');
      sel.id='edit_'+key;
      ['O+','O-','A+','A-','B+','B-','AB+','AB-'].forEach(bt=>{
        const o=document.createElement('option');
        o.value=bt;o.textContent=bt;
        if(donorData[key]===bt) o.selected=true;
        sel.appendChild(o);
      });
      edit.appendChild(sel);
    }else{
      const inp=document.createElement('input');
      inp.id='edit_'+key;
      inp.value=donorData[key]||'';
      if(key==='last_donation_date') inp.type='date';
      else inp.type='text';
      if(key==='facebook_url') inp.dir='ltr';
      edit.appendChild(inp);
    }
  });
}

document.getElementById('searchBtn').addEventListener('click',async()=>{
  const phone=document.getElementById('phoneInput').value.trim();
  if(!/^0[5-7]\d{8}$/.test(phone)){
    showToast(t('enterPhone'),'error');
    return;
  }
  if(!sb){showToast(t('toastError'),'error');return}
  document.getElementById('searchBtn').disabled=true;
  document.getElementById('searchBtn').textContent=t('loading');
  document.getElementById('errorBox').style.display='none';
  document.getElementById('dataSection').style.display='none';
  try{
    const{data,error}=await sb.from('donors').select('*').eq('phone',phone).limit(1);
    if(error) throw error;
    if(data&&data.length>0){
      donorData=data[0];
      renderData();
      document.getElementById('dataSection').style.display='block';
      document.getElementById('errorBox').style.display='none';
    }else{
      document.getElementById('dataSection').style.display='none';
      document.getElementById('errorBox').style.display='block';
    }
  }catch(e){
    document.getElementById('errorBox').style.display='block';
  }
  document.getElementById('searchBtn').disabled=false;
  document.getElementById('searchBtn').textContent=t('searchBtn');
});

document.getElementById('editAllBtn').addEventListener('click',()=>{
  renderEditForm();
  document.getElementById('editForm').classList.add('show');
  document.getElementById('editAllBtn').style.display='none';
});

document.getElementById('cancelEditBtn').addEventListener('click',()=>{
  document.getElementById('editForm').classList.remove('show');
  document.getElementById('editAllBtn').style.display='';
});

document.getElementById('saveBtn').addEventListener('click',async()=>{
  if(!sb||!donorData) return;
  const updates={};
  ['full_name','blood_type','wilaya','facebook_url','last_donation_date'].forEach(k=>{
    const el=document.getElementById('edit_'+k);
    if(el) updates[k]=el.value||null;
  });
  const availEl=document.getElementById('edit_is_available');
  if(availEl) updates.is_available=availEl.value==='true';
  try{
    const{error}=await sb.from('donors').update(updates).eq('phone',donorData.phone);
    if(error) throw error;
    Object.assign(donorData,updates);
    renderData();
    document.getElementById('editForm').classList.remove('show');
    document.getElementById('editAllBtn').style.display='';
    showToast(t('toastSaved'),'success');
  }catch(e){
    showToast(t('toastError'),'error');
  }
});

document.getElementById('downloadBtn').addEventListener('click',()=>{
  if(!donorData) return;
  const blob=new Blob([JSON.stringify(donorData,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='qatra-data-'+donorData.phone+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast(t('toastDownload'),'success');
});

document.getElementById('phoneInput').addEventListener('keydown',e=>{
  if(e.key==='Enter') document.getElementById('searchBtn').click();
});

applyLang();
</script>
</body>
</html>

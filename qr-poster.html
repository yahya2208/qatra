<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qatra - QR Code Poster</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Cairo', sans-serif;
  background: #0a0e1a;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.poster {
  background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1a0a2e 100%);
  border: 2px solid rgba(255,50,50,0.3);
  border-radius: 24px;
  padding: 50px 40px;
  max-width: 600px;
  width: 100%;
  text-align: center;
  box-shadow: 0 0 60px rgba(255,30,30,0.15), 0 0 120px rgba(255,30,30,0.05);
  position: relative;
  overflow: hidden;
}
.poster::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at center, rgba(255,30,30,0.03) 0%, transparent 50%);
  animation: pulse-bg 4s ease-in-out infinite;
}
@keyframes pulse-bg {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}
.droplet-container {
  position: relative;
  z-index: 1;
  margin-bottom: 20px;
}
.droplet {
  width: 80px;
  height: 80px;
  margin: 0 auto;
  position: relative;
}
.droplet svg {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 0 20px rgba(255,30,30,0.5));
}
.droplet::after {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 6px;
  background: radial-gradient(ellipse, rgba(255,30,30,0.3), transparent);
  border-radius: 50%;
}
.brand {
  font-size: 52px;
  font-weight: 900;
  background: linear-gradient(135deg, #ff3030, #ff6b6b, #ff3030);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  position: relative;
  z-index: 1;
}
.tagline {
  font-size: 18px;
  color: #8b949e;
  margin-bottom: 30px;
  position: relative;
  z-index: 1;
}
.qr-wrapper {
  position: relative;
  z-index: 1;
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  display: inline-block;
  margin-bottom: 30px;
  box-shadow: 0 0 40px rgba(255,30,30,0.2);
}
#qrcode {
  width: 220px;
  height: 220px;
}
#qrcode img { width: 100%; height: 100%; }
.message {
  position: relative;
  z-index: 1;
  font-size: 22px;
  font-weight: 700;
  line-height: 1.8;
  color: #e6edf3;
  margin-bottom: 15px;
}
.message span {
  color: #ff6b6b;
}
.steps {
  position: relative;
  z-index: 1;
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 25px;
  flex-wrap: wrap;
}
.step {
  text-align: center;
  flex: 0 0 auto;
}
.step-num {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ff3030, #cc0000);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 18px;
  margin: 0 auto 8px;
}
.step-text {
  font-size: 14px;
  color: #8b949e;
}
.footer-note {
  position: relative;
  z-index: 1;
  margin-top: 30px;
  font-size: 13px;
  color: #484f58;
}

.url-input-section {
  position: relative;
  z-index: 1;
  margin-top: 20px;
  display: flex;
  gap: 10px;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
}
.url-input-section input {
  padding: 10px 16px;
  border-radius: 10px;
  border: 1px solid #30363d;
  background: #0d1117;
  color: #e6edf3;
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  width: 320px;
  direction: ltr;
  text-align: left;
}
.url-input-section button {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #ff3030, #cc0000);
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
}
.url-input-section button:hover {
  box-shadow: 0 0 20px rgba(255,30,30,0.4);
}

@media print {
  body { background: #fff; }
  .poster {
    box-shadow: none;
    border: 3px solid #ff3030;
    background: #fff;
    color: #000;
  }
  .brand {
    -webkit-text-fill-color: #cc0000;
    background: none;
  }
  .tagline, .step-text, .footer-note { color: #555; }
  .message { color: #222; }
  .message span { color: #cc0000; }
  .url-input-section { display: none; }
  .droplet::after { display: none; }
}
</style>
</head>
<body>
<div class="poster">
  <div class="droplet-container">
    <div class="droplet">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="dropGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ff4444"/>
            <stop offset="50%" style="stop-color:#ff1a1a"/>
            <stop offset="100%" style="stop-color:#cc0000"/>
          </linearGradient>
          <radialGradient id="dropShine" cx="35%" cy="30%" r="50%">
            <stop offset="0%" style="stop-color:rgba(255,255,255,0.4)"/>
            <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
          </radialGradient>
        </defs>
        <path d="M50 5 C50 5, 85 45, 85 62 C85 82, 68 95, 50 95 C32 95, 15 82, 15 62 C15 45, 50 5, 50 5Z" fill="url(#dropGrad)"/>
        <path d="M50 5 C50 5, 85 45, 85 62 C85 82, 68 95, 50 95 C32 95, 15 82, 15 62 C15 45, 50 5, 50 5Z" fill="url(#dropShine)"/>
        <ellipse cx="38" cy="55" rx="10" ry="14" fill="rgba(255,255,255,0.15)" transform="rotate(-15, 38, 55)"/>
      </svg>
    </div>
  </div>

  <div class="brand">قطرة</div>
  <div class="tagline">Qatra — دليل المتبرعين بالدم</div>

  <div class="qr-wrapper">
    <div id="qrcode"></div>
  </div>

  <div class="message">
    <span>دقيقة واحدة</span> فقط من وقتك<br>
    يمكنها انقاذ <span>ثلاث</span> أرواح
  </div>

  <div class="steps">
    <div class="step">
      <div class="step-num">١</div>
      <div class="step-text">امسح الرمز</div>
    </div>
    <div class="step">
      <div class="step-num">٢</div>
      <div class="step-text">سجّل كمتبرع</div>
    </div>
    <div class="step">
      <div class="step-num">٣</div>
      <div class="step-text">انقذ حياة</div>
    </div>
  </div>

  <div class="url-input-section">
    <input type="text" id="urlInput" placeholder="أدخل رابط التطبيق هنا..." dir="ltr">
    <button onclick="generateQR()">إنشاء</button>
  </div>

  <div class="footer-note">
    لا تنسَ: التبرع بالدم آمن ومجاني — كل ٩٠ يوماً يمكنك إنقاذ حياة جديدة
  </div>
</div>

<script>
function generateQR() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;
  const qrDiv = document.getElementById('qrcode');
  qrDiv.innerHTML = '';
  
  // Generate QR code using simple canvas method
  const size = 220;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  
  // Use Google Charts API for QR generation
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=' + encodeURIComponent(url) + '&bgcolor=ffffff&color=cc0000&margin=20';
  img.onload = function() {
    ctx.drawImage(img, 0, 0, size, size);
  };
  img.onerror = function() {
    qrDiv.innerHTML = '<div style="padding:40px;color:#cc0000;font-size:14px;">تحقق من الرابط وأعد المحاولة</div>';
  };
  qrDiv.appendChild(canvas);
}

// Auto-generate with default URL
document.addEventListener('DOMContentLoaded', function() {
  const defaultUrl = window.location.origin;
  document.getElementById('urlInput').value = defaultUrl;
  generateQR();
});
</script>
</body>
</html>
